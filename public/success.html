<!DOCTYPE html>
<html>
<head>
  <title>Welcome to Night Owl! 🦉</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      padding: 2rem;
    }
    .container {
      text-align: center;
      max-width: 500px;
    }
    h1 {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
    }
    .owl { font-size: 4rem; margin-bottom: 1rem; }
    p { color: #aaa; font-size: 1.1rem; margin-bottom: 2rem; }
    .btn {
      display: inline-block;
      padding: 1rem 2rem;
      background: #c0392b;
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 1rem;
    }
    .btn:hover { background: #a93226; }
    .premium-badge {
      display: inline-block;
      background: #c0392b;
      color: #fff;
      padding: 0.5rem 1rem;
      border-radius: 20px;
      font-size: 1.2rem;
      margin: 1rem 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="owl">🎉</div>
    <h1>Congratulations!</h1>
    <div class="premium-badge">🌙 You're a Full-Fledged Night Owl! 🦉</div>
    <p>Welcome to the night shift dating community. Your premium membership is now active.</p>
    <a href="/" class="btn">Start Browsing Profiles</a>
  </div>
</body>
</html>
